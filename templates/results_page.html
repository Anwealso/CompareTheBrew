<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>Compare The Brew</title>
    <meta name="description" content="Compare The Brew" />
    <meta name="author" content="The Boys" />
    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍺</text></svg>"
    />

    <link rel="stylesheet" href="/static/css/main.css" />

    {% if dark_mode %}
    <style>
      body {
        background-color: #1a1a1a;
      }
      .resultCard {
        background-color: #4a4a4a;
      }
      .resultCard .name {
        color: #ffdc52;
      }
      .resultCard .details {
        color: #ccc;
      }
      .resultCard .brand {
        color: #cda20b;
      }
      .light {
        color: #ccc;
      }
      #searchDrink {
        color: #fff;
      }
      .buttonSort {
        background-color: #4a4a4a;
        color: #cda20b;
      }
      .buttonSortActive {
        background-color: #722f37;
        color: #cda20b;
      }
      #priceRange {
        color: #ccc;
      }
      #retailerFilter {
        color: #ccc;
        margin-left: 20px;
      }
      #options {
        color: #ccc;
      }
      #menu {
        background-color: #353535;
      }
      #menu a {
        color: #fff;
      }
      #menu .navButton {
        background-color: #4a4a4a;
        color: #fff;
      }
    </style>
    {% endif %}

    <script
      data-ad-client="ca-pub-2690757346374030"
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
    ></script>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-155323852-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "UA-155323852-1");
    </script>
  </head>

  <body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="/static/js/scripts.js"></script>

    <header id="search-header">
      {% include 'snippets/mobile_nav.html' %}
      {% include 'snippets/search_controls.html' %}
    </header>

    <div id="search-layout">
      <section id="results" class="mainResults">
        <header id="search-metadata">
          {% include 'snippets/search-metadata.html' %}
        </header>
        <ol id="results">
          {% include 'snippets/results_grid.html' %}
        </ol>
        <nav id="pagination">
          {% include 'snippets/pagination.html' %}        
        </nav>
      </section>
    </div>

    <footer>
      {% include 'snippets/footer.html' %}
    </footer>
  </body>
</html>
