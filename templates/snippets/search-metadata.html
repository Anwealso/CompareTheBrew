<!-- Results counter -->
<p id="resultsCounter">
  {% if total_results == 1 %} Found 1 drink that matched your search. 
  {% else %} Found {{ total_results }} drinks matching your search. {% endif %}
</p>

    <strong>What is Score?</strong>
    <span>Score is the number of standard drinks per dollar, multiplied by 100.</span>
  </span>
</a>
