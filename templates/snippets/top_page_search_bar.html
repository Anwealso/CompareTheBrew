<form id="query" method="GET" action="/search">
  <i
    id="searchButton"
    class="material-icons"
    style="
      padding: 1%;
      font-size: 80px;
      color: #cda20b;
      right: 0;
      position: absolute;
      margin-right: -1%;
      margin-top: 1%;
      cursor: pointer;
    "
    >search</i
  >
  <input
    name="q"
    id="searchDrink"
    type="text"
    class="smallSearch"
    placeholder="Search..."
    value="{{ search_terms if search_terms else '' }}"
  />
  <input
    type="hidden"
    name="order"
    value="{{ order if order else 'score-desc' }}"
  />
  <span class="underline smallLine"></span>
</form>
